data_dir = "data"
server_addr = "127.0.0.1:8080"

[llm]
provider = "mistral"
model = "mistral-large-latest"

[audio]
# Duree maximale acceptee pour un audio envoye, en secondes (30 min).
duree_max_secondes = 1800

[pipeline]
# Mode de la transition apres generation du scenario : "validation" (defaut,
# relecture humaine) ou "auto".
scenario = "validation"
# Mode de la transition apres choix des visuels.
visuels = "validation"
# Mode de la transition apres generation des voix.
voix = "validation"
# Mode de la transition apres le montage ffmpeg (preview + video finale).
montage = "validation"

[voix]
# Endpoint TTS Voxtral (verifie contre l'API en juillet 2026 : JSON
# { model, input, voice, response_format } -> JSON { audio_data } en base64).
# voix : slug ou UUID d'une voix du compte (GET /v1/audio/voices).
url = "https://api.mistral.ai/v1/audio/speech"
modele = "voxtral-mini-tts-2603"
voix = "en_paul_neutral"

[youtube]
# Visibilite des videos publiees : "private" (defaut prudent), "unlisted"
# ou "public". Le passage en "public" reste une decision explicite.
visibilite = "private"
# Tags ajoutes a chaque video publiee.
tags = []
# Nombre maximal d'uploads par jour : garde-fou sous le quota API
# (10 000 unites/jour, un upload = 1 600 unites, soit ~6 videos/jour).
quota_uploads_jour = 6
# Aucun secret ici : YOUTUBE_CLIENT_ID / YOUTUBE_CLIENT_SECRET passent par
# l'environnement, le refresh token par `cli youtube-auth`
# (data/youtube_token.json) ou YOUTUBE_REFRESH_TOKEN.
